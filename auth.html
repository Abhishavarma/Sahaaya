<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sahaaya Auth</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#f5f1ea,#e6d8c3);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.auth-box {
    background:white;
    padding:30px;
    border-radius:15px;
    width:350px;
    text-align:center;
}

input, select {
    width:90%;
    padding:10px;
    margin:8px 0;
}

button {
    padding:10px;
    width:95%;
    background:#b08d57;
    color:white;
    border:none;
}

.toggle {
    cursor:pointer;
    color:#8c6b3c;
}
</style>
</head>

<body>

<div class="auth-box">

<h2 id="title">Login</h2>

<!-- LOGIN -->
<div id="loginBox">

<input id="loginPhone" placeholder="Phone Number">

<div id="pinLogin">
<input id="loginPin" placeholder="4-digit PIN">
</div>

<div id="passwordLogin" style="display:none;">
<input id="loginPassword" placeholder="Password">
</div>

<select id="loginRole" onchange="toggleLoginType()">
<option value="senior">Senior</option>
<option value="caregiver">Caregiver</option>
<option value="provider">Provider</option>
<option value="admin">Admin</option>
</select>

<button onclick="login()">Login</button>

<p class="toggle" onclick="showSignup()">Create Account</p>

</div>

<!-- SIGNUP -->
<div id="signupBox" style="display:none;">

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">

<select id="role" onchange="toggleSignupType()">
<option value="senior">Senior</option>
<option value="caregiver">Caregiver</option>
<option value="provider">Provider</option>
<option value="admin">Admin</option>
</select>

<div id="pinSignup">
<input id="pin" placeholder="4-digit PIN">
</div>

<div id="passwordSignup" style="display:none;">
<input id="password" placeholder="Password">
</div>

<button onclick="sendOTP()">Send OTP</button>

<div id="otpBox" style="display:none;">
<input id="otpInput" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify OTP</button>
</div>

<p class="toggle" onclick="showLogin()">Already have account?</p>

</div>

</div>

<script>

let generatedOTP = "";

/* TOGGLE LOGIN TYPE */
function toggleLoginType(){
    let role = loginRole.value;

    if(role === "senior" || role === "caregiver"){
        pinLogin.style.display = "block";
        passwordLogin.style.display = "none";
    } else {
        pinLogin.style.display = "none";
        passwordLogin.style.display = "block";
    }
}

/* TOGGLE SIGNUP TYPE */
function toggleSignupType(){
    let role = document.getElementById("role").value;

    if(role === "senior" || role === "caregiver"){
        pinSignup.style.display = "block";
        passwordSignup.style.display = "none";
    } else {
        pinSignup.style.display = "none";
        passwordSignup.style.display = "block";
    }
}

/* SHOW SIGNUP */
function showSignup(){
    loginBox.style.display="none";
    signupBox.style.display="block";
    title.innerText="Sign Up";
}

/* SHOW LOGIN */
function showLogin(){
    loginBox.style.display="block";
    signupBox.style.display="none";
    title.innerText="Login";
}

/* FAKE OTP */
function sendOTP(){
    generatedOTP = Math.floor(1000 + Math.random()*9000);
    alert("OTP sent: " + generatedOTP);  // demo purpose
    otpBox.style.display = "block";
}

/* VERIFY OTP */
function verifyOTP(){
    let entered = otpInput.value;

    if(entered == generatedOTP){
        let user = {
            name: name.value,
            phone: phone.value,
            role: role.value,
            pin: pin.value,
            password: password.value
        };

        let users = JSON.parse(localStorage.getItem("users")) || [];
        users.push(user);
        localStorage.setItem("users", JSON.stringify(users));

        alert("Signup successful!");
        showLogin();
    } else {
        alert("Wrong OTP");
    }
}

/* LOGIN */
function login(){
    let users = JSON.parse(localStorage.getItem("users")) || [];

    let found = users.find(u =>
        u.phone == loginPhone.value &&
        (
            (u.pin && u.pin == loginPin.value) ||
            (u.password && u.password == loginPassword.value)
        )
    );

    if(found){
        localStorage.setItem("loggedIn", true);
        localStorage.setItem("role", found.role);
        window.location.href="index.html";
    } else {
        alert("Invalid credentials");
    }
}

</script>

</body>
</html>
