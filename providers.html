<!DOCTYPE html>
<html>
<head>
<title>Sahaaya | Find Care</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f5f1ea, #e6d8c3);
}

/* HERO */
.hero {
    height: 250px;
    background: url('https://images.unsplash.com/photo-1516549655169-df83a0774514?q=80&w=1600') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    background: rgba(0,0,0,0.4);
    padding: 10px 20px;
    border-radius: 10px;
}

/* MAIN */
.container {
    max-width: 1000px;
    margin: -60px auto 40px;
    padding: 20px;
}

/* SEARCH */
.search-box {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    margin-bottom: 25px;
    font-size: 14px;
}

/* CARD */
.card {
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.8);
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* TITLE */
.card h3 {
    margin: 0;
}

/* BADGE */
.badge {
    display: inline-block;
    margin-top: 5px;
    padding: 4px 10px;
    background: #2e7d32;
    color: white;
    border-radius: 20px;
    font-size: 12px;
}

/* BUTTONS */
.btn {
    margin-top: 12px;
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.call {
    background: #2e7d32;
    color: white;
}

.book {
    background: #b08b57;
    color: white;
}

/* EMPTY */
.empty {
    text-align: center;
    margin-top: 30px;
    color: #555;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Find Trusted Healthcare Providers</h1>
</div>

<!-- CONTENT -->
<div class="container">

<input 
    type="text" 
    placeholder="Search doctors, hospitals, city..." 
    class="search-box"
    onkeyup="filterProviders(this.value)"
>

<div id="list"></div>
<div id="empty" class="empty"></div>

</div>

<script>

// ROLE CHECK
let role = localStorage.getItem("role");

if(role !== "senior" && role !== "caregiver"){
    alert("Access restricted");
    window.location.href = "index.html";
}

// DATA
let doctors = JSON.parse(localStorage.getItem("doctors")) || [];

function render(data){

    let container = document.getElementById("list");
    let empty = document.getElementById("empty");

    container.innerHTML = "";
    let count = 0;

    data.forEach(d => {

        if(d.status !== "Verified") return;

        count++;

        container.innerHTML += `
            <div class="card">
                <h3>${d.name}</h3>
                <span class="badge">✔ Verified</span>
                <p>${d.type} • ${d.specialization}</p>
                <p>📍 ${d.location}</p>

                <button class="btn call" onclick="call('${d.phone}')">📞 Call</button>
                <button class="btn book" onclick="book('${d.name}')">📅 Book</button>
            </div>
        `;
    });

    if(count === 0){
        empty.innerText = "No verified providers available.";
    } else {
        empty.innerText = "";
    }
}

// SEARCH
function filterProviders(q){
    q = q.toLowerCase();

    let filtered = doctors.filter(d =>
        d.name.toLowerCase().includes(q) ||
        d.location.toLowerCase().includes(q) ||
        d.specialization.toLowerCase().includes(q)
    );

    render(filtered);
}

// ACTIONS
function call(num){
    alert("Calling " + num);
}

function book(name){
    alert("Booking requested with " + name);
}

// INIT
render(doctors);

</script>

</body>
</html>
