<!DOCTYPE html>
<html>
<head>
<title>Sahaaya Providers</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f1ea;
}

.container {
    max-width: 900px;
    margin: 40px auto;
}

.card {
    background: white;
    padding: 20px;
    margin: 15px 0;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.status {
    font-weight: bold;
    margin-top: 5px;
}

.pending {
    color: orange;
}

.verified {
    color: green;
}
</style>
</head>

<body>

<div class="container">
    <h2>Healthcare Providers</h2>
    <div id="list"></div>
</div>

<script>
let doctors = JSON.parse(localStorage.getItem("doctors")) || [];

let container = document.getElementById("list");

doctors.forEach((d, index) => {

    // simulate verification (for demo)
    if (index % 2 === 0) d.status = "Verified";

    container.innerHTML += `
        <div class="card">
            <h3>${d.name}</h3>
            <p>${d.type}</p>
            <p>${d.specialization}</p>
            <p>${d.location}</p>

            <p class="status ${d.status.toLowerCase()}">
                ${d.status === "Verified" ? "✔ Verified" : "⏳ Pending Verification"}
            </p>
        </div>
    `;
});
</script>

</body>
</html>
