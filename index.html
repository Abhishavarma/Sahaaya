<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahaaya – Care With Dignity</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
#listeningIndicator {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: red;
    animation: pulse 1s infinite;
}
@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<!-- LOGIN CHECK -->
<script>
const isLoggedIn = localStorage.getItem("loggedIn");
if (!isLoggedIn) {
    window.location.href = "auth.html";
}
</script>

<header class="navbar">
    <div class="logo-container">
        <img src="logo.png">
        <h1>Sahaaya</h1>
    </div>

    <div class="nav-right">
        <div class="language-container">
            <label>Language:</label>
            <select id="languageSwitcher">
                <option value="en">English</option>
                <option value="hi">हिन्दी</option>
                <option value="ta">தமிழ்</option>
                <option value="te">తెలుగు</option>
            </select>
        </div>

        <button id="modeToggle">🌙</button>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <h2 id="heroTitle">Care. Comfort. Dignity.</h2>
        <p id="heroDesc">
            Empowering senior citizens with safe, smart and compassionate care solutions.
        </p>

        <button class="cta-btn" id="getStartedBtn">Get Started</button>
    </div>
</section>

<!-- SERVICES -->
<section class="services">
    <h2 id="servicesTitle">Our Services</h2>

    <div class="services-grid">

        <a href="medicine.html" class="service-link">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1587854692152-cbe660dbde88?q=80&w=1200">
                <h3>Medicine Management</h3>
            </div>
        </a>

        <a href="reminders.html" class="service-link">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1506784365847-bbad939e9335?q=80&w=1200">
                <h3>Smart Reminders</h3>
            </div>
        </a>

        <a href="records.html" class="service-link">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=1200">
                <h3>Health Records</h3>
            </div>
        </a>

        <a href="emergency.html" class="service-link">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1579154204601-01588f351e67?q=80&w=1200">
                <h3>Emergency Support</h3>
            </div>
        </a>

        <!-- NEW FEATURE -->
        <a href="doctor-register.html" class="service-link">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1584515933487-779824d29309?q=80&w=1200">
                <h3>Healthcare Providers</h3>
            </div>
        </a>

    </div>

    <div id="listeningIndicator"></div>
</section>

<footer>
    © 2026 Sahaaya | Designed for Independence & Safety
</footer>

<!-- VOICE SCRIPT -->
<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const btn = document.getElementById("getStartedBtn");
const indicator = document.getElementById("listeningIndicator");

btn.addEventListener("click", () => {

    if (!SpeechRecognition) {
        alert("Voice not supported");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";

    indicator.style.display = "block";

    recognition.start();

    recognition.onresult = (event) => {
        indicator.style.display = "none";

        const text = event.results[0][0].transcript.toLowerCase();

        if (text.includes("reminder")) window.location.href = "reminders.html";
        else if (text.includes("medicine")) window.location.href = "medicine.html";
        else if (text.includes("record")) window.location.href = "records.html";
        else if (text.includes("emergency")) window.location.href = "emergency.html";
        else if (text.includes("doctor") || text.includes("hospital"))
            window.location.href = "doctor-register.html";
        else alert("Command not recognized");
    };

    recognition.onerror = () => {
        indicator.style.display = "none";
    };
});
</script>

<script src="script.js"></script>
<script src="voiceAssistant.js"></script>

</body>
</html>
